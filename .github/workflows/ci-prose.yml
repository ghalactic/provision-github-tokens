name: Lint prose

on:
  push:
  pull_request:

permissions:
  checks: write
  contents: read

jobs:
  lint-prose:
    name: Lint prose
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Vale
        uses: vale-cli/vale-action@v2
        with:
          reporter: github-check
          fail_on_error: "true"
