# yaml-language-server: $schema=https://ghalactic.github.io/provision-github-tokens/schema/provider.v1.schema.json

permissions:
  rules:
    - description: Any consumer can read metadata from anywhere
      resources:
        - accounts: ["*"]
          noRepos: true
          allRepos: true
          selectedRepos: ["*"]
      consumers: ["*", "*/*"]
      permissions:
        metadata: read
    - description: Consumer fixture can read actions on itself
      resources:
        - accounts:
            - ghalactic-fixtures
          selectedRepos:
            - provision-github-tokens-ci-consumer
      consumers:
        - ghalactic-fixtures/provision-github-tokens-ci-consumer
      permissions:
        actions: read

provision:
  rules:
    secrets:
      - description: Any requester can provision any secrets to itself
        secrets: ["*"]
        requesters: ["*/*"]
        to:
          github:
            repo:
              actions: allow
              codespaces: allow
              dependabot: allow
              environments:
                "*": allow
